<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nabati Group — Assessment Portal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
#loginPage{display:flex}
#dashPage{display:none}
body{background:#090c12;min-height:100vh}
#loginPage{align-items:center;justify-content:center;min-height:100vh;position:relative;overflow:hidden}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0}
.o1{width:440px;height:440px;background:rgba(220,38,38,.1);top:-110px;left:-110px}
.o2{width:340px;height:340px;background:rgba(234,179,8,.07);bottom:-80px;right:-80px}
.lcard{position:relative;z-index:10;width:100%;max-width:420px;margin:24px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.09);border-radius:20px;padding:44px 38px;box-shadow:0 28px 64px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.07)}
.logo-wrap{text-align:center;margin-bottom:30px}
.logo-ico{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,#dc2626,#991b1b);display:inline-flex;align-items:center;justify-content:center;margin-bottom:14px;box-shadow:0 10px 28px rgba(220,38,38,.4)}
.logo-ico svg{width:30px;height:30px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.logo-t{font-size:22px;font-weight:800;color:#fff;letter-spacing:-.4px;margin-bottom:4px}
.logo-s{font-size:11px;color:rgba(255,255,255,.28);letter-spacing:.1em;text-transform:uppercase}
.sep{height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);margin:0 0 26px}
.fl{font-size:10px;font-weight:700;color:rgba(255,255,255,.32);text-transform:uppercase;letter-spacing:.12em;margin-bottom:7px;display:block}
.iw{position:relative;margin-bottom:16px}
.iw input{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:11px;padding:14px 16px 14px 44px;color:#fff;font-size:14px;font-family:inherit;outline:none;transition:border-color .18s,background .18s}
.iw input::placeholder{color:rgba(255,255,255,.17)}
.iw input:focus{border-color:rgba(220,38,38,.5);background:rgba(255,255,255,.09)}
.ii{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.22);pointer-events:none}
.ii svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:rgba(255,255,255,.22);padding:5px;line-height:0}
.eye:hover{color:rgba(255,255,255,.5)}
.eye svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ebox{display:none;align-items:center;gap:8px;background:rgba(220,38,38,.12);border:1px solid rgba(220,38,38,.25);border-radius:8px;padding:11px 13px;margin-bottom:14px;font-size:11px;color:#fca5a5;line-height:1.5}
.ebox.on{display:flex}
.ebox svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;flex-shrink:0;stroke-linecap:round;stroke-linejoin:round}
.lbtn{width:100%;padding:14px;border:none;border-radius:11px;background:linear-gradient(135deg,#dc2626,#b91c1c);color:#fff;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 4px 18px rgba(220,38,38,.38);display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .15s,box-shadow .15s,opacity .15s;letter-spacing:.02em}
.lbtn:hover{transform:translateY(-1px);box-shadow:0 8px 26px rgba(220,38,38,.48)}
.lbtn:active{transform:translateY(0)}
.lbtn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.hint-txt{font-size:10px;color:rgba(255,255,255,.17);text-align:center;margin-top:20px;line-height:1.7}
.foot{position:fixed;bottom:16px;left:0;right:0;text-align:center;font-size:10px;color:rgba(255,255,255,.13);z-index:5}
#ldOverlay{position:fixed;inset:0;background:#090c12;z-index:9999;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px}
#ldOverlay.on{display:flex}
.spin{width:36px;height:36px;border:3px solid rgba(255,255,255,.07);border-top-color:#dc2626;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#ldTxt{font-size:12px;color:rgba(255,255,255,.35);letter-spacing:.06em}
@keyframes shake{0%,100%{transform:translateX(0)}25%,75%{transform:translateX(-5px)}50%{transform:translateX(5px)}}
.shake{animation:shake .3s ease}
#dashPage{position:fixed;inset:0;width:100%;height:100%}
#dashFrame{width:100%;height:100%;border:none;display:block}
</style>
</head>

<div id="ldOverlay">
  <div class="spin"></div>
  <div id="ldTxt">Memuat dashboard...</div>
</div>

<div id="loginPage">

    <div class="sep"></div>

    <label class="fl">Username</label>
    <div class="iw">

    <label class="fl">Password</label>

      <button class="eye" id="eyeBtn" type="button">

      </button>
    </div>

    <div class="ebox" id="errBox">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="errTxt">Username atau password salah.</span>
    </div>

    <button class="lbtn" id="loginBtn" type="button">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap:round stroke-linejoin:round>
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
        <polyline points="10 17 15 12 10 7"/>
        <line x1="15" y1="12" x2="3" y2="12"/>
      </svg>
      Masuk ke Dashboard
    </button>

    <div class="hint-txt">
      Akses terbatas untuk peserta assessment &amp; manajemen Nabati Group.<br>
      Hubungi HR jika mengalami kendala akses.
    </div>
  </div>

  <div class="foot">PT Kaldu Sari Nabati Indonesia &nbsp;&middot;&nbsp; Confidential &nbsp;&middot;&nbsp; 2025</div>
</div>

<div id="dashPage">
  <iframe id="dashFrame" title="CEO Assessment Dashboard"></iframe>
</div>

var uIn    = document.getElementById("uIn");
var pIn    = document.getElementById("pIn");
var btn    = document.getElementById("loginBtn");
var errBox = document.getElementById("errBox");
var errTxt = document.getElementById("errTxt");
var ld     = document.getElementById("ldOverlay");
var ldTxt  = document.getElementById("ldTxt");
var lcard  = document.getElementById("lcard");

// Eye toggle
document.getElementById("eyeBtn").addEventListener("click", function(){
  var show = pIn.type === "password";
  pIn.type = show ? "text" : "password";
  document.getElementById("eyeSvg").innerHTML = show
    ? '<line x1="1" y1="1" x2="23" y2="23"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>'
    : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
});

// Enter key navigation
uIn.addEventListener("keydown", function(e){ if(e.key === "Enter") pIn.focus(); });
pIn.addEventListener("keydown", function(e){ if(e.key === "Enter") doLogin(); });
btn.addEventListener("click", doLogin);

function showErr(msg){
  errTxt.textContent = msg;
  errBox.classList.add("on");
  lcard.classList.add("shake");
  setTimeout(function(){ lcard.classList.remove("shake"); }, 350);
}

function loadDashboard(){
  ld.classList.add("on");
  ldTxt.textContent = "Memuat dashboard...";
  setTimeout(function(){
    try {
      var binary = atob(DASH_B64);
      var bytes  = new Uint8Array(binary.length);
      for(var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      var blob = new Blob([bytes], {type: "text/html;charset=utf-8"});
      var url  = URL.createObjectURL(blob);
      var frame = document.getElementById("dashFrame");
      frame.onload = function(){
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("dashPage").style.display  = "block";
        ld.classList.remove("on");
        btn.disabled = false;
      };
      frame.src = url;
    } catch(e){
      ldTxt.textContent = "Gagal memuat. Coba refresh halaman.";
      btn.disabled = false;
    }
  }, 400);
}

function doLogin(){
  errBox.classList.remove("on");
  var user = uIn.value.trim().toLowerCase();
  var pass = pIn.value;

  if(!user){ showErr("Username tidak boleh kosong."); uIn.focus(); return; }
  if(!pass){ showErr("Password tidak boleh kosong."); pIn.focus(); return; }
  if(user !== USERNAME || pass !== PASSWORD){
    showErr("Username atau password salah. Silakan coba lagi.");
    pIn.value = ""; pIn.focus(); return;
  }

  btn.disabled = true;
  loadDashboard();
}
</script>
